<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>GPSImagesToMap — Flight Viewer</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        #cesiumContainer { width: 100%; height: 100%; }

        /* Image overlay panel — default (panel) mode */
        #imagePanel {
            display: none;
            position: absolute;
            top: 40px;
            left: 20px;
            background: rgba(20, 20, 30, 0.92);
            border: 1px solid #555;
            border-radius: 8px;
            padding: 12px;
            width: 720px;
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 80px);
            min-width: 320px;
            min-height: 220px;
            z-index: 1000;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            overflow: auto;
        }
        #imagePanel .panel-stage {
            position: relative;
        }
        #imagePanel img {
            max-width: 100%;
            max-height: calc(100vh - 180px);
            border-radius: 4px;
            display: block;
            margin: 0 auto;
        }
        #imagePanel .panel-toolbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            cursor: move;
            user-select: none;
        }
        #imagePanel .panel-actions {
            display: flex;
            gap: 8px;
        }
        #imagePanel .panel-toolbar button {
            color: #ccc;
            font-size: 16px;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
            padding: 2px 6px;
        }
        #imagePanel .panel-toolbar button:hover { color: #fff; }
        #imagePanel .panel-toolbar button:disabled,
        #imagePanel .image-nav button:disabled {
            opacity: 0.35;
            cursor: default;
        }
        #imagePanel .image-nav {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        #imagePanel .image-nav button {
            pointer-events: auto;
            background: rgba(20, 20, 30, 0.75);
            border: 1px solid #666;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 999px;
            cursor: pointer;
            margin: 0 8px;
            font-size: 20px;
            line-height: 1;
        }
        #imagePanel .img-label {
            color: #ccc;
            font-size: 12px;
            margin-top: 6px;
            text-align: center;
        }
        #imagePanel .resize-handle {
            position: absolute;
            right: 6px;
            bottom: 6px;
            width: 18px;
            height: 18px;
            cursor: nwse-resize;
            opacity: 0.7;
        }
        #imagePanel .resize-handle::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, transparent 0 50%, #888 50% 58%, transparent 58% 100%),
                linear-gradient(135deg, transparent 0 68%, #aaa 68% 76%, transparent 76% 100%),
                linear-gradient(135deg, transparent 0 86%, #ccc 86% 94%, transparent 94% 100%);
        }

        /* Fullscreen mode */
        #imagePanel.fullscreen {
            top: 0;
            left: 0;
            right: 0;
            max-width: 100vw;
            max-height: 100vh;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
        }
        #imagePanel.fullscreen img {
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 80px);
            margin: 0 auto;
        }
        #imagePanel.fullscreen .resize-handle {
            display: none;
        }

        /* Legend */
        #legend {
            position: absolute;
            bottom: 40px;
            left: 20px;
            background: rgba(20, 20, 30, 0.85);
            color: #ddd;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            z-index: 500;
        }
        #legend .track-item { margin-bottom: 4px; }
        #legend .dot {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>

    <div id="imagePanel">
        <div class="panel-toolbar">
            <div class="panel-actions">
                <button onclick="toggleFullscreen()" id="fullscreenBtn" title="Toggle fullscreen">⛶</button>
                <button onclick="closeImagePanel()" title="Close">&times;</button>
            </div>
        </div>
        <div class="panel-stage">
            <img id="panelImage" src="" alt="">
            <div class="image-nav">
                <button id="prevImageOverlayBtn" onclick="showPreviousImage()" title="Previous image">‹</button>
                <button id="nextImageOverlayBtn" onclick="showNextImage()" title="Next image">›</button>
            </div>
        </div>
        <div class="img-label" id="panelLabel"></div>
        <div class="resize-handle" id="resizeHandle" title="Resize panel"></div>
    </div>

    <div id="legend"></div>

    <script>
        // --- Configuration ---
        const CESIUM_TOKEN = '{{CESIUM_TOKEN}}';
        const IMAGE_MODE = '{{IMAGE_MODE}}';  // 'panel' or 'fullscreen'

        // Track colors (cycle through for multiple tracks)
        const TRACK_COLORS = [
            Cesium.Color.DODGERBLUE,
            Cesium.Color.ORANGERED,
            Cesium.Color.LIMEGREEN,
            Cesium.Color.GOLD,
            Cesium.Color.MAGENTA,
            Cesium.Color.CYAN,
        ];

        // --- Init Cesium ---
        if (CESIUM_TOKEN) {
            Cesium.Ion.defaultAccessToken = CESIUM_TOKEN;
        }

        const viewerOptions = {
            animation: false,
            timeline: false,
            geocoder: false,
            homeButton: true,
            sceneModePicker: true,
            baseLayerPicker: false,
            navigationHelpButton: false,
            fullscreenButton: true,
            infoBox: false,
            selectionIndicator: false,
        };

        if (CESIUM_TOKEN) {
            viewerOptions.terrain = Cesium.Terrain.fromWorldTerrain();
        }

        const viewer = new Cesium.Viewer('cesiumContainer', viewerOptions);
        viewer.scene.globe.enableLighting = false;
        const imageEntities = [];

        // --- Fetch data from API ---
        async function loadData() {
            const [tracksResp, imagesResp] = await Promise.all([
                fetch('/api/tracks'),
                fetch('/api/images')
            ]);
            const tracks = await tracksResp.json();
            const images = await imagesResp.json();

            const legendEl = document.getElementById('legend');
            let legendHtml = '';

            // --- Render tracks ---
            tracks.forEach((track, i) => {
                const color = TRACK_COLORS[i % TRACK_COLORS.length];
                const positions = [];

                for (const pt of track.points) {
                    positions.push(Cesium.Cartesian3.fromDegrees(pt.lon, pt.lat, pt.alt));
                }

                viewer.entities.add({
                    name: track.name,
                    polyline: {
                        positions: positions,
                        width: 3,
                        material: color,
                        clampToGround: false,
                    }
                });

                const cssColor = color.toCssColorString();
                legendHtml += `<div class="track-item"><span class="dot" style="background:${cssColor}"></span>${track.name} (${track.points.length} pts)</div>`;
            });

            if (images.length > 0) {
                legendHtml += `<div class="track-item" style="margin-top:6px">📷 ${images.length} geotagged image(s)</div>`;
            }
            legendEl.innerHTML = legendHtml;

            // --- Render image markers ---
            images.forEach((img) => {
                const entity = viewer.entities.add({
                    name: img.filename,
                    position: Cesium.Cartesian3.fromDegrees(img.lon, img.lat, img.alt + 15),
                    billboard: {
                        image: '/thumbnails/' + encodeURIComponent(img.filename),
                        width: 48,
                        height: 48,
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                        heightReference: Cesium.HeightReference.NONE,
                        disableDepthTestDistance: Number.POSITIVE_INFINITY,
                    },
                    properties: {
                        filename: img.filename,
                        lat: img.lat,
                        lon: img.lon,
                        alt: img.alt,
                    }
                });
                imageEntities.push(entity);
            });

            // Fly to extent of all entities
            if (tracks.length > 0 || images.length > 0) {
                viewer.zoomTo(viewer.entities);
            }
        }

        // --- Click handler for image billboards ---
        let selectedEntity = null;
        let currentImageIndex = -1;
        let connectorEntity = null;
        const NORMAL_SIZE = 48;
        const SELECTED_SIZE = 56;

        function getEntityFilename(entity) {
            return entity?.properties?.filename?.getValue?.();
        }

        function updateNavigationButtons() {
            const hasImages = imageEntities.length > 0;
            const atStart = currentImageIndex <= 0;
            const atEnd = currentImageIndex >= imageEntities.length - 1;
            document.getElementById('prevImageOverlayBtn').disabled = !hasImages || atStart;
            document.getElementById('nextImageOverlayBtn').disabled = !hasImages || atEnd;
        }

        function highlightEntity(entity) {
            // Reset previous
            if (selectedEntity && selectedEntity.billboard) {
                selectedEntity.billboard.width = NORMAL_SIZE;
                selectedEntity.billboard.height = NORMAL_SIZE;
                selectedEntity.point = undefined;
            }
            if (connectorEntity) {
                viewer.entities.remove(connectorEntity);
                connectorEntity = null;
            }
            // Highlight new
            selectedEntity = entity;
            if (entity && entity.billboard && entity.properties) {
                entity.billboard.width = SELECTED_SIZE;
                entity.billboard.height = SELECTED_SIZE;

                const lat = entity.properties.lat?.getValue();
                const lon = entity.properties.lon?.getValue();
                const alt = entity.properties.alt?.getValue();
                if (lat !== undefined && lon !== undefined && alt !== undefined) {
                    const trackPos = Cesium.Cartesian3.fromDegrees(lon, lat, alt);
                    const billboardPos = Cesium.Cartesian3.fromDegrees(lon, lat, alt + 15);

                    // Red dot at exact track position
                    connectorEntity = viewer.entities.add({
                        polyline: {
                            positions: [trackPos, billboardPos],
                            width: 2,
                            material: Cesium.Color.RED,
                            clampToGround: false,
                        },
                        position: trackPos,
                        point: {
                            pixelSize: 10,
                            color: Cesium.Color.RED,
                            outlineColor: Cesium.Color.WHITE,
                            outlineWidth: 2,
                            disableDepthTestDistance: Number.POSITIVE_INFINITY,
                        },
                    });
                }
            }
        }

        const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
        handler.setInputAction(function(click) {
            const picked = viewer.scene.pick(click.position);
            if (Cesium.defined(picked) && picked.id && picked.id.properties) {
                const imageIndex = imageEntities.indexOf(picked.id);
                if (imageIndex !== -1) {
                    showImageAtIndex(imageIndex);
                }
            }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        function showImageAtIndex(index) {
            if (index < 0 || index >= imageEntities.length) {
                return;
            }
            currentImageIndex = index;
            const entity = imageEntities[index];
            const props = entity.properties;
            const filename = getEntityFilename(entity);
            showImagePanel(filename, props);
            highlightEntity(entity);
            updateNavigationButtons();
        }

        function showImagePanel(filename, props) {
            const panel = document.getElementById('imagePanel');
            const img = document.getElementById('panelImage');
            const label = document.getElementById('panelLabel');

            img.src = '/images/' + encodeURIComponent(filename);
            const lat = props.lat?.getValue()?.toFixed(6) ?? '';
            const lon = props.lon?.getValue()?.toFixed(6) ?? '';
            const alt = props.alt?.getValue()?.toFixed(0) ?? '';
            label.textContent = `${filename}  (${lat}, ${lon}, ${alt}m)`;
            if (IMAGE_MODE === 'fullscreen') {
                enterFullscreen();
            }
            panel.style.display = 'block';
        }

        function showPreviousImage() {
            showImageAtIndex(currentImageIndex - 1);
        }

        function showNextImage() {
            showImageAtIndex(currentImageIndex + 1);
        }

        function closeImagePanel() {
            const panel = document.getElementById('imagePanel');
            exitFullscreen();
            panel.style.display = 'none';
            currentImageIndex = -1;
            updateNavigationButtons();
            highlightEntity(null);
        }

        function toggleFullscreen() {
            const panel = document.getElementById('imagePanel');
            if (panel.classList.contains('fullscreen')) {
                exitFullscreen();
            } else {
                enterFullscreen();
            }
        }

        function enterFullscreen() {
            const panel = document.getElementById('imagePanel');
            if (panel.classList.contains('fullscreen')) {
                return;
            }
            panel.dataset.prevLeft = panel.style.left;
            panel.dataset.prevTop = panel.style.top;
            panel.dataset.prevRight = panel.style.right;
            panel.dataset.prevWidth = panel.style.width;
            panel.dataset.prevHeight = panel.style.height;
            panel.dataset.prevMaxWidth = panel.style.maxWidth;
            panel.style.removeProperty('left');
            panel.style.removeProperty('top');
            panel.style.removeProperty('right');
            panel.style.removeProperty('width');
            panel.style.removeProperty('height');
            panel.style.removeProperty('max-width');
            panel.classList.add('fullscreen');
        }

        function exitFullscreen() {
            const panel = document.getElementById('imagePanel');
            if (!panel.classList.contains('fullscreen')) {
                return;
            }
            panel.classList.remove('fullscreen');
            panel.style.left = panel.dataset.prevLeft || '';
            panel.style.top = panel.dataset.prevTop || '';
            panel.style.right = panel.dataset.prevRight || '';
            panel.style.width = panel.dataset.prevWidth || '';
            panel.style.height = panel.dataset.prevHeight || '';
            panel.style.maxWidth = panel.dataset.prevMaxWidth || '';
        }

        function anchorPanelToViewport(panel) {
            panel.style.left = `${panel.offsetLeft}px`;
            panel.style.top = `${panel.offsetTop}px`;
            panel.style.right = 'auto';
        }

        // Close panel on Escape
        document.addEventListener('keydown', (e) => {
            const panel = document.getElementById('imagePanel');
            if (panel.style.display !== 'block') {
                return;
            }
            if (e.key === 'Escape') closeImagePanel();
            if (e.key === 'ArrowLeft') showPreviousImage();
            if (e.key === 'ArrowRight') showNextImage();
        });

        (function setupPanelResize() {
            const panel = document.getElementById('imagePanel');
            const handle = document.getElementById('resizeHandle');
            let resizeState = null;

            handle.addEventListener('mousedown', (event) => {
                if (panel.classList.contains('fullscreen')) {
                    return;
                }
                anchorPanelToViewport(panel);
                resizeState = {
                    startX: event.clientX,
                    startY: event.clientY,
                    startWidth: panel.offsetWidth,
                    startHeight: panel.offsetHeight,
                };
                event.preventDefault();
            });

            window.addEventListener('mousemove', (event) => {
                if (!resizeState) {
                    return;
                }
                const width = Math.max(320, resizeState.startWidth + (event.clientX - resizeState.startX));
                const height = Math.max(220, resizeState.startHeight + (event.clientY - resizeState.startY));
                panel.style.width = `${width}px`;
                panel.style.height = `${height}px`;
            });

            window.addEventListener('mouseup', () => {
                resizeState = null;
            });
        })();

        (function setupPanelDrag() {
            const panel = document.getElementById('imagePanel');
            const toolbar = panel.querySelector('.panel-toolbar');
            let dragState = null;

            toolbar.addEventListener('mousedown', (event) => {
                if (panel.classList.contains('fullscreen')) {
                    return;
                }
                if (event.target.closest('button')) {
                    return;
                }
                dragState = {
                    startX: event.clientX,
                    startY: event.clientY,
                    startLeft: panel.offsetLeft,
                    startTop: panel.offsetTop,
                };
                anchorPanelToViewport(panel);
                event.preventDefault();
            });

            window.addEventListener('mousemove', (event) => {
                if (!dragState) {
                    return;
                }
                const maxLeft = Math.max(0, window.innerWidth - panel.offsetWidth);
                const maxTop = Math.max(0, window.innerHeight - panel.offsetHeight);
                const nextLeft = Math.min(
                    Math.max(0, dragState.startLeft + (event.clientX - dragState.startX)),
                    maxLeft,
                );
                const nextTop = Math.min(
                    Math.max(0, dragState.startTop + (event.clientY - dragState.startY)),
                    maxTop,
                );
                panel.style.left = `${nextLeft}px`;
                panel.style.top = `${nextTop}px`;
            });

            window.addEventListener('mouseup', () => {
                dragState = null;
            });
        })();

        // --- Start ---
        loadData().catch(err => {
            console.error('Failed to load data:', err);
            document.getElementById('legend').innerHTML =
                `<div style="color:#f66">Error loading data: ${err.message}</div>`;
        });
    </script>
</body>
</html>
